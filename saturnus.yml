lsp:
        # ==========================================
        # 1. BASE DIAGNOSTICS (Source of Truth)
        # ==========================================
        DiagnosticError: "red"
        DiagnosticWarn:  "orange"
        DiagnosticInfo:  "yellow"
        DiagnosticHint:  "blue"
        DiagnosticOk:    "green"

        # ==========================================
        # 2. GUTTER SIGNS
        # ==========================================
        DiagnosticSignError: "@DiagnosticError"
        DiagnosticSignWarn:  "@DiagnosticWarn"
        DiagnosticSignInfo:  "@DiagnosticInfo"
        DiagnosticSignHint:  "@DiagnosticHint"
        DiagnosticSignOk:    "@DiagnosticOk"

        # ==========================================
        # 3. FLOATING WINDOWS (e.g., pressing 'K' or 'gl')
        # ==========================================
        DiagnosticFloatingError: "@DiagnosticError"
        DiagnosticFloatingWarn:  "@DiagnosticWarn"
        DiagnosticFloatingInfo:  "@DiagnosticInfo"
        DiagnosticFloatingHint:  "@DiagnosticHint"
        DiagnosticFloatingOk:    "@DiagnosticOk"

        # ==========================================
        # 4. VIRTUAL TEXT (Inline diagnostics)
        # ==========================================
        # Using the brighter variants as per your original config
        DiagnosticVirtualTextError: "red"
        DiagnosticVirtualTextWarn:  "orange"
        DiagnosticVirtualTextInfo:  "yellow2"
        DiagnosticVirtualTextHint:  "blue2"
        DiagnosticVirtualTextOk:    "green2"

        # ==========================================
        # 5. VIRTUAL LINES (For plugins like lsp_lines.nvim)
        # ==========================================
        DiagnosticVirtualLinesError: "@DiagnosticVirtualTextError"
        DiagnosticVirtualLinesWarn:  "@DiagnosticVirtualTextWarn"
        DiagnosticVirtualLinesInfo:  "@DiagnosticVirtualTextInfo"
        DiagnosticVirtualLinesHint:  "@DiagnosticVirtualTextHint"
        DiagnosticVirtualLinesOk:    "@DiagnosticVirtualTextOk"

        # ==========================================
        # 6. UNDERLINES (Squiggles under the code)
        # ==========================================
        DiagnosticUnderlineError: "red - u"
        DiagnosticUnderlineWarn:  "orange - u"
        DiagnosticUnderlineInfo:  "yellow - u"
        DiagnosticUnderlineHint:  "blue - u"
        DiagnosticUnderlineOk:    "green - u"

        # ==========================================
        # 7. MISCELLANEOUS (Unused and Deprecated code)
        # ==========================================
        DiagnosticDeprecated:  "@@comment - s"  # Faded text + Strikethrough
        DiagnosticUnnecessary: "@@comment"      # Faded text for unused variables


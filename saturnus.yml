information:
        name: neptunus
        background: dark
        author: "gg"
# fg: saturn: #c0bdb6 #c0bdb0 #c0bda6 #c6cbbd neptune: #c5ebed (Play \w HUE)
# bg: #14161B1
palette:
        fg:       "#fbfbdd"
        bg:       "#000000"
        bg1:      "#0c0c0c"
        bg2:      "#292929"
        bg3:      "#2f2f2f"
        bg4:      "#3a3a3a"
        bg5:      "#4e4e4e"
        bg6:      "#5f5f5f"
        bg7:      "#747474"
        bg8:      "#888888"
        bg9:      "#9b9b9b"
# Use 2nd set for rare things, first set for common things. 2nd is brighter.
        red:      "#e13504"
        red2:     "#f24451"
        green:    "#0ecc6e"
        green2:   "#59f87d"
        yellow:   "#fdd401"
        yellow2:  "#fdef28"
        blue:     "#4d8cfe"
        blue2:    "#6699ff"
        cyan:     "#4289a1"
        cyan2:    "#3b90ad"
        purple:   "#975ea7"
        purple2:  "#b891c3"
        orange:   "#ff8800"
        orange2:  "#fe8019"
        gray:     "#808080"
        gray2:    "#a0b0b0"

# b i r u: bold italic reverse underlined
# first: text color, may skip with -, second for bg.
# To find variables: https://neovim.io/doc/user/syntax.html#highlight-groups
# Also to find variables :h highlight-groups
# Also check :highlight to see currently set variables.

highlights:
        # ==========================================
        # 1. CORE UI & EDITOR
        # ==========================================
        Normal:         "fg bg"
        NormalNC:       "- bg1"       # Non-focused windows
        CursorLine:     "- bg1"       # Current line's color
        CursorColumn:   "@CursorLine" # Vertical cursor line
        ColorColumn:    "@CursorLine" # 80 character mark's color
        LineNr:         "bg3"         # Line numbers on the leftmost
        CursorLineNr:   "bg8 - b"     # Active line number
        SignColumn:     "- bg"
        FoldColumn:     ""
        Folded:         "bg8"         # Fold color
        VertSplit:      "bg3"         # Legacy window separator
        WinSeparator:   "@VertSplit"  # Modern Neovim window separator (Added)
        EndOfBuffer:    "bg"

        # Faded UI Elements
        NonText:        "gray"
        SpecialKey:     "@NonText"
        Conceal:        "@NonText"    # color used for concealed text, conceallevel---------

        Whitespace:     "bg3 -"       # Invisible characters, tablines :h listchars ----
        Directory:      "blue2"       # Directory names & special names in listings-------

        # ==========================================
        # 2. MESSAGES & TERMINAL
        # ==========================================
        Terminal:       "@Normal"
        MsgArea:        "@Normal"
        ModeMsg:        "@Normal"
        MsgSeparator:   "@Normal"

        Title:          "fg"
        MoreMsg:        "@Title"
        WarningMsg:     "yellow"
        Question:       "@WarningMsg"
        ErrorMsg:       "red2"        # Errors that appear at command area.

        lCursor:        "fg bg"
        TermCursor:     "fg bg"
        TermCursorNC:   "fg bg"

        # ==========================================
        # 3. POPUPS & FLOATING WINDOWS
        # ==========================================
        NormalFloat:    "fg bg"       # vim.diagnostic float colors (set background same with floatborder fg decides border-line-color and default-fg for document-cmp.)
        FloatBorder:    "@NormalFloat" # vim.diagnostic float border(fg) and padding(bg) color
        Pmenu:          "@NormalFloat" # nvim-cmp popup text AND popup BORDER. Consider seperating FloatBorder in window.XXX.winhighlight (same as FloatBorder and NormalFloat)

        PmenuSel:       "bg blue"     # nvim-cmp popup selected colors
        WildMenu:       "@PmenuSel"

        PmenuSbar:      "- gray"
        PmenuThumb:     "- fg"

        # ==========================================
        # 4. SEARCH, SELECTION & MATCHING
        # ==========================================
        Visual:         "yellow bg3"
        VisualNOS:      "yellow bg4"
        Search:         "fg purple b"
        IncSearch:      "purple fg b"

        MatchParen:     "orange - -"
        MatchParenCur:  "@MatchParen"
        MatchWord:      "- - u"
        MatchWordCur:   "@MatchWord"

        Substitute:     "gray orange"
        QuickFixLine:   "bg yellow"

        # ==========================================
        # 5. TABS & STATUSLINE
        # ==========================================
        TabLine:        "gray"
        TabLineSel:     "fg"
        TabLineFill:    " - "
        StatusLine:     "fg bg3"      # Added base fallback
        StatusLineNC:   "gray bg"     # Added base fallback

        # ==========================================
        # 6. SPELL CHECK
        # ==========================================
        SpellBad:       "red2 - u"
        SpellCap:       "green2"
        SpellLocal:     "@SpellCap"
        SpellRare:      "@SpellCap"

        # ==========================================
        # 7. DIFF & GIT (Vim Built-in)
        # ==========================================
        # Neovim Core UI Diff (Added)
        DiffAdd:        "green2 - b"
        DiffChange:     "yellow - b"
        DiffDelete:     "red2 - b"
        DiffText:       "yellow - b"

        # https://github.com/neovim/neovim/blob/master/runtime/syntax/diff.vim
        diffAdded:      "green"       #
        diffChanged:    "yellow"      #
        diffRemoved:    "red"         #
        diffLine:       "purple - b"  #
        diffFile:       "blue"        #
        diffOldFile:    "red2"        #
        diffNewFile:    "green2"      #
        diffIndexLine:  "yellow"      #
        diffComment:    "@Comment"    #

        # ==========================================
        # 8. BASE SYNTAX (The Source of Truth)
        # ==========================================

        # Strings
        String:         "red"
        Character:      "@String"

        # Data Values
        Constant:       "orange"
        Number:         "gray - b"
        Float:          "@Number"
        Boolean:        "green2 - b"

        # Identifiers & Functions
        Variable:       "fg"
        Identifier:     "fg - b"
        Function:       "green - b"

        # Logic & Control Flow
        Statement:      "purple"      # \left, \theta \pi etc. (LATEX)
        Exception:      "@Statement"
        Conditional:    "purple - b"
        Repeat:         "bg6 - b"
        Keyword:        "@Repeat"

        # Types & Storage
        Type:           "green"       # THIS IS \textbf \mathbb etc. (LATEX) ..................
        StorageClass:   "@Type"
        Typedef:        "yellow"
        Structure:      "@Typedef"

        # Punctuation & Operators
        Operator:       "yellow2"
        Label:          "blue2"
        Special:        "purple - b"  # \n etc. .......................................
        SpecialChar:    "fg"
        Delimiter:      "bg6"

        # Preprocessor & Macros
        PreProc:        "yellow -"    # COPY OF TREESITTER ##
        Macro:          "bg6"         # COPY OF TREESITTER ------------------------------------
        Define:         "@Macro"      # COPY OF TREESITTER -----------------------------------
        Include:        "@Macro"      # TSInclude -------------------------------------------
        PreCondit:      "bg6 - b"     # #if #endif, TSKeyword -------------------------

        # Comments
        Comment:        "bg3 - b"
        SpecialComment: "@Comment"
        Todo:           "bg4 yellow b" # TSTodo ----------------------------------------

        # Diagnostics/Other
        Error:          "red2 - b"    # Unknown.
        Debug:          "red"
        Ignore:         "cyan bg b"
        Underlined:     "- - u"
        Tag:            "red"

#       Bold:           '- - b'
#       Italic:         '- - i'
#       Cursor: "- - -" # doesn't work, use terminal (character color  under cursor)
treesitter:
        # ==========================================
        # 1. IDENTIFIERS (Variables, Constants, Modules)
        # ==========================================
        "@variable": "@Variable"                 # Base variable
        "@variable.builtin": "purple2"           # built-in (e.g., `this`, `self`)
        "@variable.parameter": "@Variable"       # function parameters
        "@variable.parameter.builtin": "- fg"    # special params (e.g., `_`)
        "@variable.member": "@Variable"          # object and struct fields

        "@constant": "@Constant"                 # UPPERCASE constants
        "@constant.builtin": "green"             # built-in constant values (`nil`)
        "@constant.macro": "@Macro"              # preprocessor constants

        "@module": "purple b"                    # modules or namespaces
        "@module.builtin": "purple b"            # built-in modules
        "@label": "@Label"                       # GOTO labels

        # ==========================================
        # 2. LITERALS (Strings, Numbers, Booleans)
        # ==========================================
        "@string": "@String"                     # Base string literals
        "@string.documentation": "@String"       # Docstrings
        "@string.regexp": "@String"              # Regular expressions
        "@string.escape": "@String"              # Escape sequences
        "@string.special": "@String"             # Other special strings
        "@string.special.symbol": "@String"      # Symbols or atoms
        "@string.special.url": "- - u"           # URIs (hyperlinks)
        "@string.special.path": "@String"        # Filenames

        "@character": "@Character"               # Single characters
        "@character.special": "@SpecialChar"     # Special characters

        "@boolean": "@Boolean"                   # True, False

        "@number": "@Number"                     # Integers
        "@number.float": "@Float"                # Floats

        # ==========================================
        # 3. TYPES & ATTRIBUTES
        # ==========================================
        "@type": "@Type"                         # Base type/class
        "@type.builtin": "purple - b"            # Built-in types
        "@type.definition": "green2"             # Type definitions (typedef)

        "@attribute": "@PreProc"                 # Annotations/Decorators (e.g. @property)
        "@attribute.builtin": "yellow"           # Builtin annotations
        "@property": "fg"                        # Key in key/value pairs

        # ==========================================
        # 4. FUNCTIONS & METHODS
        # ==========================================
        "@function": "@Function"                 # Base functions
        "@function.builtin": "green2"            # Built-in functions
        "@function.call": "yellow"               # Function calls
        "@function.macro": "@Macro"              # Preprocessor macros

        "@function.method": "purple b"           # Method definitions
        "@function.method.call": "purple b"      # Method calls
        "@constructor": "@Delimiter"             # Constructor calls (Same as bg6 delimiter)

        # ==========================================
        # 5. KEYWORDS, OPERATORS & PUNCTUATION
        # ==========================================
        "@keyword": "@Keyword"                   # Base keywords
        "@keyword.conditional": "@Conditional"   # if / else
        "@keyword.conditional.ternary": "red"    # ? / :
        "@keyword.repeat": "@Repeat"             # for / while
        "@keyword.exception": "@Exception"       # throw / catch
        "@keyword.return": "purple - b"          # return / yield

        "@keyword.coroutine": "purple - b"       # async / await
        "@keyword.function": "purple - b"        # func / def
        "@keyword.operator": "purple - b"        # and / or / sizeof
        "@keyword.import": "purple - b"          # import / from
        "@keyword.type": "red"                   # struct / enum
        "@keyword.modifier": "red"               # const / static / public
        "@keyword.debug": "@Debug"               # Debug keywords

        "@keyword.directive": "@PreProc"         # Preprocessor directives (#if)
        "@keyword.directive.define": "@Define"   # Preprocessor define (#define)

        "@operator": "@Operator"                 # Symbolic operators (+, *, -)

        "@punctuation.delimiter": "@Delimiter"   # delimiters (; . ,)
        "@punctuation.bracket": "@Delimiter"     # brackets () {} []
        "@punctuation.special": "@Delimiter"     # string interpolation symbols

        # ==========================================
        # 6. COMMENTS
        # ==========================================
        "@comment": "@Comment"                   # Base comments
        "@comment.documentation": "@Comment"     # Documentation comments
        "@comment.error": "red - -"              # ERROR, FIXME, DEPRECATED
        "@comment.warning": "- fg"               # WARNING, FIX, HACK
        "@comment.todo": "@Todo"                 # TODO, WIP
        "@comment.note": "@Todo"                 # NOTE, INFO, XXX

        # ==========================================
        # 7. MARKDOWN & LATEX (Markup)
        # ==========================================
        "@markup.heading.1.markdown": "orange - b"
        "@markup.heading.2.markdown": "green - b"
        "@markup.heading.3.markdown": "blue - b"
        "@markup.heading.4.markdown": "cyan - b"
        "@markup.heading.5.markdown": "red - b"
        "@markup.heading.6.markdown": "purple2 - b"
        "@markup.heading.markdown": "bg4"        # The '#' symbols

        "@markup.link.url.markdown": "cyan - u"
        "@markup.link.label.markdown": "cyan - u"
        "@markup.list.markdown": "yellow2"

        "@markup.math": "purple"                 # Math environments ($...$)
        "@markup.environment": "blue - b"        # LaTeX \begin \end blocks (Replaces TSEnvironment)
        "@markup.environment.name": "fg - b"     # LaTeX {itemize} (Replaces TSEnvironmentName)

        # Uncomment these if you want Treesitter to format your markdown/doc text natively
        # "@markup.strong": "- - b"              # Bold
        # "@markup.italic": "- - i"              # Italic
        # "@markup.strikethrough": "- - s"       # Strikethrough
        # "@markup.underline": "- - u"           # Underline

lsp_semantic:
        # --------------------------------------------------------------------#
        # LSP Semantic Token Types
        # These override Tree-sitter when the LSP has project-wide context.
        # --------------------------------------------------------------------#
        "@lsp.type.class": "yellow"
        "@lsp.type.comment": "@@comment"
        "@lsp.type.decorator": "yellow" # Same as @attribute
        "@lsp.type.enum": "green"
        "@lsp.type.enumMember": "cyan"
        "@lsp.type.event": "yellow"
        "@lsp.type.function": "green - b"
        "@lsp.type.interface": "yellow"
        "@lsp.type.keyword": "bg6 - b"
        "@lsp.type.macro": "bg6 - b"
        "@lsp.type.method": "purple b"
        "@lsp.type.modifier": "red"
        "@lsp.type.namespace": "purple b" # Same as @module
        "@lsp.type.number": "blue"
        "@lsp.type.operator": "yellow"
        "@lsp.type.parameter": "fg"
        "@lsp.type.property": "fg"
        "@lsp.type.regexp": "red"
        "@lsp.type.string": "@lsp.type.regexp"
        "@lsp.type.struct": "yellow"
        "@lsp.type.type": "green"
        "@lsp.type.typeParameter": "cyan"
        "@lsp.type.variable": "fg"
        # --------------------------------------------------------------------#
        # LSP Semantic Token Modifiers
        # This is where LSP shines (e.g., underlining mutable variables)
        # --------------------------------------------------------------------#
        "@lsp.mod.deprecated": "- - s" # Strikethrough
        "@lsp.typemod.variable.mutable": "- - u" # Underline mutable variables
        "@lsp.typemod.function.async": "cyan - i" # Italic/Cyan async functions
        "@lsp.typemod.method.async": "cyan bg i" # Italic/Cyan async methods
        "@lsp.typemod.variable.readonly": "orange" # Constant/Readonly variables
        "@lsp.typemod.parameter.mutable": "- - u" # Underline mutable params

